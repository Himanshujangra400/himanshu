name: Deploy Backend to Render

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-render.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render Deploy Hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Missing Render Deploy Hook Secret
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_URL secret is not set."
          echo "Create a Render backend service and add its deploy hook URL as a repository secret."
